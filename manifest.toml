packaging_format = 2

id = "filebrowser"
name = "Filebrowser"
description.en = "Web File Browser"
description.fr = "Gestionnaire de fichiers"

version = "2.63.3~ynh1"

maintainers = [ ]

[upstream]
license = "Apache-2.0"
website = "https://filebrowser.org"
admindoc = "https://filebrowser.org/"
code = "https://github.com/filebrowser/filebrowser"

[integration]
yunohost = ">= 12.1.38"
helpers_version = "2.1"
architectures = "all"
multi_instance = true

ldap = false
sso = false

disk = "50M"
ram.build = "100M"
ram.runtime = "50M"

[install]
    [install.domain]
    type = "domain"

    [install.path]
    type = "path"
    default = "/filebrowser"

    [install.init_main_permission]
    type = "group"
    default = "visitors"

    [install.admin]
    type = "user"

    [install.password]
    type = "password"
    help.en = "Minimum length is 12"
    help.fr = "12 caractères minimum"

[resources]

    [resources.sources]

        [resources.sources.main]
        in_subdir = false
        amd64.url = "https://github.com/filebrowser/filebrowser/releases/download/v2.63.3/linux-amd64-filebrowser.tar.gz"
        amd64.sha256 = "3938b553573e1f6c982725410c562941b70edd11f77eace60f444d43319fbbf9"
        arm64.url = "https://github.com/filebrowser/filebrowser/releases/download/v2.63.3/linux-arm64-filebrowser.tar.gz"
        arm64.sha256 = "0efaf31e0a35566d53dd927d44b02746228447df582bfd8c6d31002af18c88b3"
        i386.url = "https://github.com/filebrowser/filebrowser/releases/download/v2.63.3/linux-386-filebrowser.tar.gz"
        i386.sha256 = "25c91fc54dee7b8a8fcd407c23f4c2e09839a67005c963b4b06d6a9c9f1ed916"
        armhf.url = "https://github.com/filebrowser/filebrowser/releases/download/v2.63.3/linux-armv7-filebrowser.tar.gz"
        armhf.sha256 = "845c0f72211c57bdd6748d2bbab90052b696287cdb11fe648a954a77e2d6a2d4"

        autoupdate.strategy = "latest_github_release"
        autoupdate.asset.amd64 = "^linux-amd64-filebrowser.tar.gz$"
        autoupdate.asset.arm64 = "^linux-arm64-filebrowser.tar.gz$"
        autoupdate.asset.i386 = "^linux-386-filebrowser.tar.gz$"
        autoupdate.asset.armhf = "^linux-armv7-filebrowser.tar.gz$"

    [resources.ports]

    [resources.system_user]

    [resources.install_dir]

    [resources.data_dir]

    [resources.permissions]
    main.url = "/"
