packaging_format = 2

id = "filebrowser"
name = "Filebrowser"
description.en = "Web File Browser"
description.fr = "Gestionnaire de fichiers"

version = "2.63.5~ynh1"

maintainers = [ ]

[upstream]
license = "Apache-2.0"
website = "https://filebrowser.org"
admindoc = "https://filebrowser.org/"
code = "https://github.com/filebrowser/filebrowser"

[integration]
yunohost = ">= 12.1.38"
helpers_version = "2.1"
architectures = "all"
multi_instance = true

ldap = false
sso = false

disk = "50M"
ram.build = "100M"
ram.runtime = "50M"

[install]
    [install.domain]
    type = "domain"

    [install.path]
    type = "path"
    default = "/filebrowser"

    [install.init_main_permission]
    type = "group"
    default = "visitors"

    [install.admin]
    type = "user"

    [install.password]
    type = "password"
    help.en = "Minimum length is 12"
    help.fr = "12 caractères minimum"

[resources]

    [resources.sources]

        [resources.sources.main]
        in_subdir = false
        amd64.url = "https://github.com/filebrowser/filebrowser/releases/download/v2.63.5/linux-amd64-filebrowser.tar.gz"
        amd64.sha256 = "b36ad6296db0a749a5adbc792ab5321d11b307106123d44e171b7c158fcca2d9"
        arm64.url = "https://github.com/filebrowser/filebrowser/releases/download/v2.63.5/linux-arm64-filebrowser.tar.gz"
        arm64.sha256 = "395412c63dcb211af216d5f73fdf1322f0302a2508594f57d6945f900701b78a"
        i386.url = "https://github.com/filebrowser/filebrowser/releases/download/v2.63.5/linux-386-filebrowser.tar.gz"
        i386.sha256 = "d46f0316355e3e444756f1fa7e77562b50d60797ae1a520c71d56990f2ff12c8"
        armhf.url = "https://github.com/filebrowser/filebrowser/releases/download/v2.63.5/linux-armv7-filebrowser.tar.gz"
        armhf.sha256 = "15d1442ddd77d92d6a0cc38db261761059c1e6fd489941090c7e56212305757a"

        autoupdate.strategy = "latest_github_release"
        autoupdate.asset.amd64 = "^linux-amd64-filebrowser.tar.gz$"
        autoupdate.asset.arm64 = "^linux-arm64-filebrowser.tar.gz$"
        autoupdate.asset.i386 = "^linux-386-filebrowser.tar.gz$"
        autoupdate.asset.armhf = "^linux-armv7-filebrowser.tar.gz$"

    [resources.ports]

    [resources.system_user]

    [resources.install_dir]

    [resources.data_dir]

    [resources.permissions]
    main.url = "/"
