packaging_format = 2

id = "filebrowser"
name = "Filebrowser"
description.en = "Web File Browser"
description.fr = "Gestionnaire de fichiers"

version = "2.61.2~ynh1"

maintainers = [ ]

[upstream]
license = "Apache-2.0"
website = "https://filebrowser.org"
admindoc = "https://filebrowser.org/"
code = "https://github.com/filebrowser/filebrowser"

[integration]
yunohost = ">= 12.1.38"
helpers_version = "2.1"
architectures = "all"
multi_instance = true

ldap = false
sso = false

disk = "50M"
ram.build = "100M"
ram.runtime = "50M"

[install]
    [install.domain]
    type = "domain"

    [install.path]
    type = "path"
    default = "/filebrowser"

    [install.init_main_permission]
    type = "group"
    default = "visitors"

    [install.admin]
    type = "user"

    [install.password]
    type = "password"
    help.en = "Minimum length is 12"
    help.fr = "12 caractères minimum"

[resources]

    [resources.sources]

        [resources.sources.main]
        in_subdir = false
        amd64.url = "https://github.com/filebrowser/filebrowser/releases/download/v2.61.2/linux-amd64-filebrowser.tar.gz"
        amd64.sha256 = "34a2869c5655bf531f08352f4adbe58f8a6d2327dfffaeb1c8f0923f721b3abb"
        arm64.url = "https://github.com/filebrowser/filebrowser/releases/download/v2.61.2/linux-arm64-filebrowser.tar.gz"
        arm64.sha256 = "3e1fa5bb2320ab317cae8e7325ee4d409004981b17571bf80008c96dabfef23c"
        i386.url = "https://github.com/filebrowser/filebrowser/releases/download/v2.61.2/linux-386-filebrowser.tar.gz"
        i386.sha256 = "af1d8f2d22cba087e87aa0ef9cf5246656a320de9d9e82069e8b8da75067b3ec"
        armhf.url = "https://github.com/filebrowser/filebrowser/releases/download/v2.61.2/linux-armv7-filebrowser.tar.gz"
        armhf.sha256 = "733153fbbef506830d131b951a76a737d1134dcf43adf106b0775d3d55fd6d46"

        autoupdate.strategy = "latest_github_release"
        autoupdate.asset.amd64 = "^linux-amd64-filebrowser.tar.gz$"
        autoupdate.asset.arm64 = "^linux-arm64-filebrowser.tar.gz$"
        autoupdate.asset.i386 = "^linux-386-filebrowser.tar.gz$"
        autoupdate.asset.armhf = "^linux-armv7-filebrowser.tar.gz$"

    [resources.ports]

    [resources.system_user]

    [resources.install_dir]

    [resources.data_dir]

    [resources.permissions]
    main.url = "/"
