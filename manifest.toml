packaging_format = 2

id = "filebrowser"
name = "Filebrowser"
description.en = "Web File Browser"
description.fr = "Gestionnaire de fichiers"

version = "2.61.0~ynh1"

maintainers = [ ]

[upstream]
license = "Apache-2.0"
website = "https://filebrowser.org"
admindoc = "https://filebrowser.org/"
code = "https://github.com/filebrowser/filebrowser"

[integration]
yunohost = ">= 12.1.38"
helpers_version = "2.1"
architectures = "all"
multi_instance = true

ldap = false
sso = false

disk = "50M"
ram.build = "100M"
ram.runtime = "50M"

[install]
    [install.domain]
    type = "domain"

    [install.path]
    type = "path"
    default = "/filebrowser"

    [install.init_main_permission]
    type = "group"
    default = "visitors"

    [install.admin]
    type = "user"

    [install.password]
    type = "password"
    help.en = "Minimum length is 12"
    help.fr = "12 caractères minimum"

[resources]

    [resources.sources]

        [resources.sources.main]
        in_subdir = false
        amd64.url = "https://github.com/filebrowser/filebrowser/releases/download/v2.61.0/linux-amd64-filebrowser.tar.gz"
        amd64.sha256 = "730d0c87dc64f375fda5e349633f8da860cfceb5df995501df6f4d1b6e99d409"
        arm64.url = "https://github.com/filebrowser/filebrowser/releases/download/v2.61.0/linux-arm64-filebrowser.tar.gz"
        arm64.sha256 = "a94665aee85d478db7e8378fcd7ad642c437db542c0877c4e4d4d57265f44086"
        i386.url = "https://github.com/filebrowser/filebrowser/releases/download/v2.61.0/linux-386-filebrowser.tar.gz"
        i386.sha256 = "69eb95e155284c6415af9885547338b86b0861547373646718b433914ae75292"
        armhf.url = "https://github.com/filebrowser/filebrowser/releases/download/v2.61.0/linux-armv7-filebrowser.tar.gz"
        armhf.sha256 = "e537157cb0a198ae35bf52d3370a98e5f13c92d079845f8f2a20077d6d94ad93"

        autoupdate.strategy = "latest_github_release"
        autoupdate.asset.amd64 = "^linux-amd64-filebrowser.tar.gz$"
        autoupdate.asset.arm64 = "^linux-arm64-filebrowser.tar.gz$"
        autoupdate.asset.i386 = "^linux-386-filebrowser.tar.gz$"
        autoupdate.asset.armhf = "^linux-armv7-filebrowser.tar.gz$"

    [resources.ports]

    [resources.system_user]

    [resources.install_dir]

    [resources.data_dir]

    [resources.permissions]
    main.url = "/"
