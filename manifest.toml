packaging_format = 2

id = "filebrowser"
name = "Filebrowser"
description.en = "Web File Browser"
description.fr = "Gestionnaire de fichiers"

version = "2.63.12~ynh1"

maintainers = [ ]

[upstream]
license = "Apache-2.0"
website = "https://filebrowser.org"
admindoc = "https://filebrowser.org/"
code = "https://github.com/filebrowser/filebrowser"

[integration]
yunohost = ">= 12.1.38"
helpers_version = "2.1"
architectures = "all"
multi_instance = true

ldap = false
sso = false

disk = "50M"
ram.build = "100M"
ram.runtime = "50M"

[install]
    [install.domain]
    type = "domain"

    [install.path]
    type = "path"
    default = "/filebrowser"

    [install.init_main_permission]
    type = "group"
    default = "visitors"

    [install.admin]
    type = "user"

    [install.password]
    type = "password"
    help.en = "Minimum length is 12"
    help.fr = "12 caractères minimum"

[resources]

    [resources.sources]

        [resources.sources.main]
        in_subdir = false
        amd64.url = "https://github.com/filebrowser/filebrowser/releases/download/v2.63.12/linux-amd64-filebrowser.tar.gz"
        amd64.sha256 = "f4312d530f8fbe771872f8037698b50c5e673a7f22da9708432e0dc034e74677"
        arm64.url = "https://github.com/filebrowser/filebrowser/releases/download/v2.63.12/linux-arm64-filebrowser.tar.gz"
        arm64.sha256 = "a5d38f55436a7466027606e9e5c39dee7c683c4d0b2c1cc1de4d62f541c6970e"
        i386.url = "https://github.com/filebrowser/filebrowser/releases/download/v2.63.12/linux-386-filebrowser.tar.gz"
        i386.sha256 = "ef260a83f73dac915a366790917ce6bffdc7b4036457a3286f40c0655c8f9bc3"
        armhf.url = "https://github.com/filebrowser/filebrowser/releases/download/v2.63.12/linux-armv7-filebrowser.tar.gz"
        armhf.sha256 = "c473a6818f8f6ade9a0f2b8175a05833af92c478a914da9b52a80ea69d6aa0c4"

        autoupdate.strategy = "latest_github_release"
        autoupdate.asset.amd64 = "^linux-amd64-filebrowser.tar.gz$"
        autoupdate.asset.arm64 = "^linux-arm64-filebrowser.tar.gz$"
        autoupdate.asset.i386 = "^linux-386-filebrowser.tar.gz$"
        autoupdate.asset.armhf = "^linux-armv7-filebrowser.tar.gz$"

    [resources.ports]

    [resources.system_user]

    [resources.install_dir]

    [resources.data_dir]

    [resources.permissions]
    main.url = "/"
