packaging_format = 2

id = "filebrowser"
name = "Filebrowser"
description.en = "Web File Browser"
description.fr = "Gestionnaire de fichiers"

version = "2.63.16~ynh1"

maintainers = [ ]

[upstream]
license = "Apache-2.0"
website = "https://filebrowser.org"
admindoc = "https://filebrowser.org/"
code = "https://github.com/filebrowser/filebrowser"

[integration]
yunohost = ">= 12.1.39"
helpers_version = "2.1"
architectures = "all"
multi_instance = true

ldap = false
sso = false

disk = "50M"
ram.build = "100M"
ram.runtime = "50M"

[install]
    [install.domain]
    type = "domain"

    [install.path]
    type = "path"
    default = "/filebrowser"

    [install.init_main_permission]
    type = "group"
    default = "visitors"

    [install.admin]
    type = "user"

    [install.password]
    type = "password"
    help.en = "Minimum length is 12"
    help.fr = "12 caractères minimum"

[resources]

    [resources.sources]

        [resources.sources.main]
        in_subdir = false
        amd64.url = "https://github.com/filebrowser/filebrowser/releases/download/v2.63.16/linux-amd64-filebrowser.tar.gz"
        amd64.sha256 = "0bce2341e32266c87e6858db5dbfcd649b09c9941434a2b3d1aff9b36690034a"
        arm64.url = "https://github.com/filebrowser/filebrowser/releases/download/v2.63.16/linux-arm64-filebrowser.tar.gz"
        arm64.sha256 = "6563a3ee9235aed59427db7db3aeb951d06c5338ca2593f9ebf97ec0a60a8dc4"
        i386.url = "https://github.com/filebrowser/filebrowser/releases/download/v2.63.16/linux-386-filebrowser.tar.gz"
        i386.sha256 = "771732c583c4a50b18e29924dda9982277d029aa7c419d6fa6a1c0e97125981d"
        armhf.url = "https://github.com/filebrowser/filebrowser/releases/download/v2.63.16/linux-armv7-filebrowser.tar.gz"
        armhf.sha256 = "3fdf1d29f10d12036939113d43f85870c47e50e37c61902fa93925d9b7d96f00"

        autoupdate.strategy = "latest_github_release"
        autoupdate.asset.amd64 = "^linux-amd64-filebrowser.tar.gz$"
        autoupdate.asset.arm64 = "^linux-arm64-filebrowser.tar.gz$"
        autoupdate.asset.i386 = "^linux-386-filebrowser.tar.gz$"
        autoupdate.asset.armhf = "^linux-armv7-filebrowser.tar.gz$"

    [resources.ports]

    [resources.system_user]

    [resources.install_dir]

    [resources.data_dir]

    [resources.permissions]
    main.url = "/"
