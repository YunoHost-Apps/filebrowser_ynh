packaging_format = 2

id = "filebrowser"
name = "Filebrowser"
description.en = "Web File Browser"
description.fr = "Gestionnaire de fichiers"

version = "2.63.1~ynh1"

maintainers = [ ]

[upstream]
license = "Apache-2.0"
website = "https://filebrowser.org"
admindoc = "https://filebrowser.org/"
code = "https://github.com/filebrowser/filebrowser"

[integration]
yunohost = ">= 12.1.38"
helpers_version = "2.1"
architectures = "all"
multi_instance = true

ldap = false
sso = false

disk = "50M"
ram.build = "100M"
ram.runtime = "50M"

[install]
    [install.domain]
    type = "domain"

    [install.path]
    type = "path"
    default = "/filebrowser"

    [install.init_main_permission]
    type = "group"
    default = "visitors"

    [install.admin]
    type = "user"

    [install.password]
    type = "password"
    help.en = "Minimum length is 12"
    help.fr = "12 caractères minimum"

[resources]

    [resources.sources]

        [resources.sources.main]
        in_subdir = false
        amd64.url = "https://github.com/filebrowser/filebrowser/releases/download/v2.63.1/linux-amd64-filebrowser.tar.gz"
        amd64.sha256 = "298a491ae48ae929a2bf10f6fe6f4a63057f8535810244414f078b4e336e859b"
        arm64.url = "https://github.com/filebrowser/filebrowser/releases/download/v2.63.1/linux-arm64-filebrowser.tar.gz"
        arm64.sha256 = "5fda7ad30c54df9ac28bb11a375523a7ed5f11ddaed4001a4f38f9530bf3bde3"
        i386.url = "https://github.com/filebrowser/filebrowser/releases/download/v2.63.1/linux-386-filebrowser.tar.gz"
        i386.sha256 = "d729d47e98c59022acf1503b448dbdc812d92d4145d7e11d232d26db1cc0a7f4"
        armhf.url = "https://github.com/filebrowser/filebrowser/releases/download/v2.63.1/linux-armv7-filebrowser.tar.gz"
        armhf.sha256 = "12d4c38b4ca4f2bb4401187b5be89666c50cbda4edc0440553256dd99d7ee2e3"

        autoupdate.strategy = "latest_github_release"
        autoupdate.asset.amd64 = "^linux-amd64-filebrowser.tar.gz$"
        autoupdate.asset.arm64 = "^linux-arm64-filebrowser.tar.gz$"
        autoupdate.asset.i386 = "^linux-386-filebrowser.tar.gz$"
        autoupdate.asset.armhf = "^linux-armv7-filebrowser.tar.gz$"

    [resources.ports]

    [resources.system_user]

    [resources.install_dir]

    [resources.data_dir]

    [resources.permissions]
    main.url = "/"
