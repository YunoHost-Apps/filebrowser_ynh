packaging_format = 2

id = "filebrowser"
name = "Filebrowser"
description.en = "Web File Browser"
description.fr = "Gestionnaire de fichiers"

version = "2.62.1~ynh1"

maintainers = [ ]

[upstream]
license = "Apache-2.0"
website = "https://filebrowser.org"
admindoc = "https://filebrowser.org/"
code = "https://github.com/filebrowser/filebrowser"

[integration]
yunohost = ">= 12.1.38"
helpers_version = "2.1"
architectures = "all"
multi_instance = true

ldap = false
sso = false

disk = "50M"
ram.build = "100M"
ram.runtime = "50M"

[install]
    [install.domain]
    type = "domain"

    [install.path]
    type = "path"
    default = "/filebrowser"

    [install.init_main_permission]
    type = "group"
    default = "visitors"

    [install.admin]
    type = "user"

    [install.password]
    type = "password"
    help.en = "Minimum length is 12"
    help.fr = "12 caractères minimum"

[resources]

    [resources.sources]

        [resources.sources.main]
        in_subdir = false
        amd64.url = "https://github.com/filebrowser/filebrowser/releases/download/v2.62.1/linux-amd64-filebrowser.tar.gz"
        amd64.sha256 = "fda39b79f5b5ce805820755eb0f28af92991f8fe8d9e10ebb73436f013d33c32"
        arm64.url = "https://github.com/filebrowser/filebrowser/releases/download/v2.62.1/linux-arm64-filebrowser.tar.gz"
        arm64.sha256 = "f923d7c84ca8f5e4a51b0c0173680c9728ab0814ed0394b5cad4c9a16a982f3f"
        i386.url = "https://github.com/filebrowser/filebrowser/releases/download/v2.62.1/linux-386-filebrowser.tar.gz"
        i386.sha256 = "9f498c177fde41446e4e815a270873103a94f9d149eba6ca0708c48817a5a07e"
        armhf.url = "https://github.com/filebrowser/filebrowser/releases/download/v2.62.1/linux-armv7-filebrowser.tar.gz"
        armhf.sha256 = "e3616220c8c2c0042fd2ea385298c886da20f52359971dae6f9c8b2825527019"

        autoupdate.strategy = "latest_github_release"
        autoupdate.asset.amd64 = "^linux-amd64-filebrowser.tar.gz$"
        autoupdate.asset.arm64 = "^linux-arm64-filebrowser.tar.gz$"
        autoupdate.asset.i386 = "^linux-386-filebrowser.tar.gz$"
        autoupdate.asset.armhf = "^linux-armv7-filebrowser.tar.gz$"

    [resources.ports]

    [resources.system_user]

    [resources.install_dir]

    [resources.data_dir]

    [resources.permissions]
    main.url = "/"
