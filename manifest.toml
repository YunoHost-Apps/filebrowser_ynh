packaging_format = 2

id = "filebrowser"
name = "Filebrowser"
description.en = "Web File Browser"
description.fr = "Gestionnaire de fichiers"

version = "2.63.18~ynh1"

maintainers = [ ]

[upstream]
license = "Apache-2.0"
website = "https://filebrowser.org"
admindoc = "https://filebrowser.org/"
code = "https://github.com/filebrowser/filebrowser"

[integration]
yunohost = ">= 12.1.39"
helpers_version = "2.1"
architectures = "all"
multi_instance = true

ldap = false
sso = false

disk = "50M"
ram.build = "100M"
ram.runtime = "50M"

[install]
    [install.domain]
    type = "domain"

    [install.path]
    type = "path"
    default = "/filebrowser"

    [install.init_main_permission]
    type = "group"
    default = "visitors"

    [install.admin]
    type = "user"

    [install.password]
    type = "password"
    help.en = "Minimum length is 12"
    help.fr = "12 caractères minimum"

[resources]

    [resources.sources]

        [resources.sources.main]
        in_subdir = false
        amd64.url = "https://github.com/filebrowser/filebrowser/releases/download/v2.63.18/linux-amd64-filebrowser.tar.gz"
        amd64.sha256 = "cd599c34afad0e8e61c577d1061c820bccb7feaa3c5a4477a12db586a1cd93ff"
        arm64.url = "https://github.com/filebrowser/filebrowser/releases/download/v2.63.18/linux-arm64-filebrowser.tar.gz"
        arm64.sha256 = "29b3935c222d91522874e98dfa33195ee7d2acdac5dfbf37c1361a73704a28de"
        i386.url = "https://github.com/filebrowser/filebrowser/releases/download/v2.63.18/linux-386-filebrowser.tar.gz"
        i386.sha256 = "4dd99f1bab4cd396551e931af31148af00ff6cece6995549112175826699d24f"
        armhf.url = "https://github.com/filebrowser/filebrowser/releases/download/v2.63.18/linux-armv7-filebrowser.tar.gz"
        armhf.sha256 = "79edb6f9b582a0d4df2e126cf6f0a184d725967ada5a064e3d0effd345dbb8b5"

        autoupdate.strategy = "latest_github_release"
        autoupdate.asset.amd64 = "^linux-amd64-filebrowser.tar.gz$"
        autoupdate.asset.arm64 = "^linux-arm64-filebrowser.tar.gz$"
        autoupdate.asset.i386 = "^linux-386-filebrowser.tar.gz$"
        autoupdate.asset.armhf = "^linux-armv7-filebrowser.tar.gz$"

    [resources.ports]

    [resources.system_user]

    [resources.install_dir]

    [resources.data_dir]

    [resources.permissions]
    main.url = "/"
