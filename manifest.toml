packaging_format = 2

id = "filebrowser"
name = "Filebrowser"
description.en = "Web File Browser"
description.fr = "Gestionnaire de fichiers"

version = "2.62.2~ynh1"

maintainers = [ ]

[upstream]
license = "Apache-2.0"
website = "https://filebrowser.org"
admindoc = "https://filebrowser.org/"
code = "https://github.com/filebrowser/filebrowser"

[integration]
yunohost = ">= 12.1.38"
helpers_version = "2.1"
architectures = "all"
multi_instance = true

ldap = false
sso = false

disk = "50M"
ram.build = "100M"
ram.runtime = "50M"

[install]
    [install.domain]
    type = "domain"

    [install.path]
    type = "path"
    default = "/filebrowser"

    [install.init_main_permission]
    type = "group"
    default = "visitors"

    [install.admin]
    type = "user"

    [install.password]
    type = "password"
    help.en = "Minimum length is 12"
    help.fr = "12 caractères minimum"

[resources]

    [resources.sources]

        [resources.sources.main]
        in_subdir = false
        amd64.url = "https://github.com/filebrowser/filebrowser/releases/download/v2.62.2/linux-amd64-filebrowser.tar.gz"
        amd64.sha256 = "6f5680254df113ea58b09698beca878823bf0970da5edecded2f7fc2bf4042c0"
        arm64.url = "https://github.com/filebrowser/filebrowser/releases/download/v2.62.2/linux-arm64-filebrowser.tar.gz"
        arm64.sha256 = "9a9bed37b2f837d872ee18ab2d54fb06e659320fc77fd4f4ff10d65c24967aaf"
        i386.url = "https://github.com/filebrowser/filebrowser/releases/download/v2.62.2/linux-386-filebrowser.tar.gz"
        i386.sha256 = "94103b2cd361b39e86016065ac8805e82449d25cb97adf1da06e8b76523c6d40"
        armhf.url = "https://github.com/filebrowser/filebrowser/releases/download/v2.62.2/linux-armv7-filebrowser.tar.gz"
        armhf.sha256 = "25854453862cb32688c7b0dd731ea75576a904e44d3ea9f490fe0c5b8426e12b"

        autoupdate.strategy = "latest_github_release"
        autoupdate.asset.amd64 = "^linux-amd64-filebrowser.tar.gz$"
        autoupdate.asset.arm64 = "^linux-arm64-filebrowser.tar.gz$"
        autoupdate.asset.i386 = "^linux-386-filebrowser.tar.gz$"
        autoupdate.asset.armhf = "^linux-armv7-filebrowser.tar.gz$"

    [resources.ports]

    [resources.system_user]

    [resources.install_dir]

    [resources.data_dir]

    [resources.permissions]
    main.url = "/"
