packaging_format = 2

id = "filebrowser"
name = "Filebrowser"
description.en = "Web File Browser"
description.fr = "Gestionnaire de fichiers"

version = "2.63.10~ynh1"

maintainers = [ ]

[upstream]
license = "Apache-2.0"
website = "https://filebrowser.org"
admindoc = "https://filebrowser.org/"
code = "https://github.com/filebrowser/filebrowser"

[integration]
yunohost = ">= 12.1.38"
helpers_version = "2.1"
architectures = "all"
multi_instance = true

ldap = false
sso = false

disk = "50M"
ram.build = "100M"
ram.runtime = "50M"

[install]
    [install.domain]
    type = "domain"

    [install.path]
    type = "path"
    default = "/filebrowser"

    [install.init_main_permission]
    type = "group"
    default = "visitors"

    [install.admin]
    type = "user"

    [install.password]
    type = "password"
    help.en = "Minimum length is 12"
    help.fr = "12 caractères minimum"

[resources]

    [resources.sources]

        [resources.sources.main]
        in_subdir = false
        amd64.url = "https://github.com/filebrowser/filebrowser/releases/download/v2.63.10/linux-amd64-filebrowser.tar.gz"
        amd64.sha256 = "cef9423bc9b9bd105101c455cc62b9eccb5a4e9a40a1a32503f64e88d8958ea6"
        arm64.url = "https://github.com/filebrowser/filebrowser/releases/download/v2.63.10/linux-arm64-filebrowser.tar.gz"
        arm64.sha256 = "fe0cf94e67b615e1071c643a93c33f453ec07e32fc0c624f02c1138c9169c922"
        i386.url = "https://github.com/filebrowser/filebrowser/releases/download/v2.63.10/linux-386-filebrowser.tar.gz"
        i386.sha256 = "5b98dbf3b7b3b5ca3d46a4d6cd684a72d87053a03fa2d2e6f0a358f392f26fbf"
        armhf.url = "https://github.com/filebrowser/filebrowser/releases/download/v2.63.10/linux-armv7-filebrowser.tar.gz"
        armhf.sha256 = "abd2f3ee4d72bff5d550a14a8c681c1f84ba91df4745381568a640e7d8708671"

        autoupdate.strategy = "latest_github_release"
        autoupdate.asset.amd64 = "^linux-amd64-filebrowser.tar.gz$"
        autoupdate.asset.arm64 = "^linux-arm64-filebrowser.tar.gz$"
        autoupdate.asset.i386 = "^linux-386-filebrowser.tar.gz$"
        autoupdate.asset.armhf = "^linux-armv7-filebrowser.tar.gz$"

    [resources.ports]

    [resources.system_user]

    [resources.install_dir]

    [resources.data_dir]

    [resources.permissions]
    main.url = "/"
